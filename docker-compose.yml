
services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hackflow_postgres
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-2007}
      POSTGRES_DB: ${DB_NAME:-hackflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-hackflow}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hackflow_net

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hackflow_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hackflow_net

  # ── Migrate (one-shot) ────────────────────────────────────────
  migrate:
    build:
      context: ./
      dockerfile: Dockerfile
      target: production
    container_name: hackflow_migrate
    command: sh ./migrate.sh
    env_file:
      - ./.env
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
      REDIS_HOST: redis
      NODE_OPTIONS: '--max-old-space-size=1536'
    mem_limit: 2g
    memswap_limit: 2g
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hackflow_net
    restart: 'no'

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./
      dockerfile: Dockerfile
      target: production
    container_name: hackflow_backend
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3443'
    env_file:
      - ./.env
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - hackflow_net

volumes:
  postgres_data:
  redis_data:

networks:
  hackflow_net:
    driver: bridge